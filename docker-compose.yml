services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cronjob-app
    restart: unless-stopped
    ports:
      - "${SERVER_PORT:-8080}:8080"
    env_file:
      - .env
    environment:
      - DB_HOST=db
    depends_on:
      db:
        condition: service_healthy
    networks:
      - cronjob-network

  db:
    image: postgres:16-alpine
    container_name: cronjob-db
    restart: unless-stopped
    ports:
      - "${DB_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
      POSTGRES_DB: ${DB_DATABASE:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_DATABASE:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cronjob-network

volumes:
  postgres_data:
    driver: local

networks:
  cronjob-network:
    driver: bridge
